[tool.ruff]
line-length = 120
target-version = "py312"
# Código que no es nuestro o es generado: no se lintea.
extend-exclude = [
    ".claude",              # skills vendoreadas de terceros
    "alembic/versions",     # migraciones autogeneradas
]

[tool.ruff.lint]
# Baseline conservador: pycodestyle (E/W) + pyflakes (F).
# No incluimos isort/pyupgrade/bugbear para no imponer reescrituras masivas
# ni reordenar imports en todo el repo. El objetivo del lint en CI es cazar
# código muerto (imports/variables sin usar), no cambiar estilo.
select = ["E", "W", "F"]
ignore = [
    "E501",  # largo de línea: lo controla el formateador, no debe romper el CI
]

[tool.ruff.lint.per-file-ignores]
# Los modelos usan forward-refs en strings (Mapped["Service"]) que ruff no
# resuelve: F821 es falso positivo aquí. SQLAlchemy los resuelve en runtime.
"app/models/*.py" = ["F821"]
# conftest y test_hygiene fijan variables de entorno ANTES de importar la app,
# por eso algunos imports no van al inicio del archivo (E402 es intencional).
"tests/conftest.py" = ["E402"]
"tests/test_hygiene.py" = ["E402"]
