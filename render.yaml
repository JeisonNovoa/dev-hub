services:
  - type: web
    name: dev-hub
    runtime: python
    buildCommand: npm ci && npm run build:css && pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false   # Pega aquí la URL de Supabase (ver README para obtenerla)
      - key: APP_NAME
        value: Dev Hub
      - key: DEBUG
        value: false
      - key: ENCRYPTION_KEY
        sync: false   # Genera una con: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      - key: SECRET_KEY
        sync: false   # Genera una con: python -c "import secrets; print(secrets.token_hex(32))"
