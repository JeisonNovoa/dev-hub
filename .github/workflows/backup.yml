# Backup diario y cifrado de la base de datos (Supabase) como artefacto de GitHub.
#
# Requiere dos secrets en Settings → Secrets and variables → Actions:
#   DATABASE_URL       — la URL de Supabase (sirve tal cual está en .env, con +psycopg2)
#   BACKUP_PASSPHRASE  — frase con la que se cifra el dump (¡guárdala fuera de Dev Hub!)
#
# Restaurar: ver sección "Backups" del README.
#
# Cifrado: GPG simétrico con AES-256 y MDC (Modification Detection Code).
# A diferencia de openssl AES-256-CBC, GPG incluye integridad autenticada:
# si el artefacto se altera, el descifrado falla limpiamente en vez de
# producir datos corruptos silenciosamente.

name: Backup de la base de datos

on:
  schedule:
    - cron: "0 8 * * *" # diario a las 08:00 UTC = 3:00 a.m. Colombia
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Instalar cliente PostgreSQL 17 (Supabase corre PG 17)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y -qq postgresql-client-17

      - name: Dump comprimido y cifrado (GPG AES-256 con MDC)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          set -euo pipefail
          # Binario versionado directo: el runner trae también el cliente 16 y el
          # wrapper genérico de Ubuntu puede resolver a esa versión (mismatch).
          PG_DUMP=/usr/lib/postgresql/17/bin/pg_dump
          "$PG_DUMP" --version
          # Acepta la URL tal cual está en .env (quita el dialecto de SQLAlchemy si viene)
          CLEAN_URL="${DATABASE_URL/postgresql+psycopg2:/postgresql:}"
          STAMP=$(date -u +%Y-%m-%d_%H%M)
          FILE="devhub_${STAMP}.sql.gz"
          "$PG_DUMP" "$CLEAN_URL" --no-owner --no-privileges | gzip -9 > "$FILE"
          # Un dump sano de esta BD jamás es tan pequeño: aborta si vino vacío
          test "$(stat -c%s "$FILE")" -gt 1024
          # Cifrado simétrico AES-256 con integridad (MDC). --force-mdc es no-op
          # en GPG 2.x (MDC es default) pero lo dejamos explícito por documentación.
          gpg --batch --yes --passphrase "$BACKUP_PASSPHRASE" \
              --symmetric --cipher-algo AES256 --force-mdc \
              -o "$FILE.gpg" "$FILE"
          shred -u "$FILE"
          echo "FILE_ENC=$FILE.gpg" >> "$GITHUB_ENV"

      - name: Verificar que el backup es restaurable (descifrado de prueba)
        env:
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          set -euo pipefail
          gpg --batch --yes --passphrase "$BACKUP_PASSPHRASE" \
              -d "$FILE_ENC" > check.sql.gz
          gunzip -c check.sql.gz > check.sql
          grep -q "PostgreSQL database dump" check.sql
          grep -q "CREATE TABLE" check.sql
          shred -u check.sql check.sql.gz
          echo "Backup verificado: descifra correctamente y contiene el esquema"

      - name: Subir artefacto (retención 30 días)
        uses: actions/upload-artifact@v4
        with:
          name: devhub-backup-${{ github.run_id }}
          path: "*.sql.gz.gpg"
          retention-days: 30
          if-no-files-found: error
