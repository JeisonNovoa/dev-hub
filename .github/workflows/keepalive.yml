# Mantiene despierto el servicio de Render (free tier duerme tras 15 min sin
# tráfico) pegándole a /health cada ~10 minutos. Sin esto, el primer uso de la
# extensión o la web tras un rato de inactividad tarda 30-60s.
#
# Notas:
# - Los crons de GitHub no son puntuales (pueden correr con minutos de retraso);
#   para esto da igual: basta con que pegue antes de los 15 min.
# - Render free da 750 h/mes de cómputo: alcanza para tener UN servicio
#   despierto 24/7 (744 h en un mes de 31 días). Si la cuenta tuviera más
#   servicios free, compartirían esas horas.
# - Si el repo se vuelve privado, los minutos de Actions dejan de ser
#   ilimitados y este cron los consume (~4.300 min/mes): en ese caso migrar a
#   un monitor externo gratuito (UptimeRobot o cron-job.org) apuntando a /health.

name: Keep-alive de Render

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /health
        run: |
          # max-time alto: si estaba dormido, esta misma petición lo despierta (~30-60s)
          curl -fsS --max-time 120 --retry 2 --retry-delay 5 \
            https://dev-hub-ogdr.onrender.com/health
          echo "Render despierto"
