<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="header">
    <span class="logo">▸ dev-hub</span>
    <span id="state-badge" class="badge"></span>
  </header>

  <!-- Estado: cargando -->
  <section id="view-loading" class="view">
    <p class="muted">Cargando…</p>
  </section>

  <!-- Estado: sin configurar (login + crear PIN) -->
  <section id="view-setup" class="view" hidden>
    <p class="muted small">Conecta la extensión con tu Dev Hub. Solo se hace una vez.</p>
    <label>URL de tu Dev Hub</label>
    <input id="setup-url" type="url" placeholder="https://tu-app.onrender.com" autocomplete="off" />
    <label>Email</label>
    <input id="setup-email" type="email" placeholder="tu@email.com" autocomplete="off" />
    <label>Contraseña de Dev Hub</label>
    <input id="setup-password" type="password" placeholder="••••••••" />
    <label>Crea tu PIN de desbloqueo (mín. 4 dígitos)</label>
    <input id="setup-pin" type="password" inputmode="numeric" pattern="[0-9]*" placeholder="ej. 2026" maxlength="12" />
    <label>Repite el PIN</label>
    <input id="setup-pin2" type="password" inputmode="numeric" pattern="[0-9]*" placeholder="repite el PIN" maxlength="12" />
    <p id="setup-error" class="error" hidden></p>
    <button id="setup-submit" class="btn primary">Conectar</button>
    <p class="muted tiny">Tu PIN nunca sale de este navegador: solo cifra el acceso localmente.</p>
  </section>

  <!-- Estado: bloqueado (pedir PIN) -->
  <section id="view-locked" class="view" hidden>
    <p class="muted small">Conectado como <span id="locked-email" class="mono"></span></p>
    <label>PIN de desbloqueo</label>
    <input id="unlock-pin" type="password" inputmode="numeric" pattern="[0-9]*" placeholder="••••" maxlength="12" autofocus />
    <p id="unlock-error" class="error" hidden></p>
    <button id="unlock-submit" class="btn primary">Desbloquear</button>
    <button id="locked-logout" class="btn ghost">Cerrar sesión</button>
  </section>

  <!-- Estado: desbloqueado -->
  <section id="view-unlocked" class="view" hidden>
    <p class="muted small">Conectado como <span id="unlocked-email" class="mono"></span></p>
    <div class="status-ok">
      <span class="dot"></span> Desbloqueado — <span id="unlock-remaining" class="mono"></span>
    </div>
    <p class="muted tiny">El ícono de Dev Hub aparece en los campos de contraseña. Haz clic para autocompletar.</p>
    <button id="lock-now" class="btn">Bloquear ahora</button>
    <button id="unlocked-logout" class="btn ghost">Cerrar sesión</button>
  </section>

  <script src="popup.js"></script>
</body>
</html>
