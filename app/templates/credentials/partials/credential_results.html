{% if credentials %}
<!-- Desktop: tabla -->
<div class="hidden md:block bg-surface-card/60 backdrop-blur-md border border-surface-border rounded-xl overflow-x-auto shadow-sm">
  <table class="w-full min-w-[760px] table-fixed text-sm">
    <thead>
      <tr class="border-b border-surface-border bg-surface-card/40">
        <th class="px-4 py-3 text-left w-[24%]">
          <button type="button"
                  class="flex items-center gap-1 text-xs font-mono uppercase tracking-widest transition-colors"
                  :class="sort === 'label' ? 'text-accent' : 'text-gray-600 hover:text-gray-400'"
                  @click="order = (sort === 'label' && order === 'asc') ? 'desc' : 'asc'; sort = 'label'; $nextTick(() => document.getElementById('sort-trigger').click())">
            nombre
            <span x-show="sort === 'label'" x-text="order === 'asc' ? '↑' : '↓'" class="text-accent"></span>
          </button>
        </th>
        <th class="px-4 py-3 text-left text-xs font-mono text-gray-600 uppercase tracking-widest w-[19%]">usuario</th>
        <th class="px-4 py-3 text-left text-xs font-mono text-gray-600 uppercase tracking-widest w-[17%]">contraseña</th>
        <th class="px-4 py-3 text-left text-xs font-mono text-gray-600 uppercase tracking-widest w-[14%]">url</th>
        <th class="px-4 py-3 text-left w-[9%]">
          <button type="button"
                  class="flex items-center gap-1 text-xs font-mono uppercase tracking-widest transition-colors"
                  :class="sort === 'category' ? 'text-accent' : 'text-gray-600 hover:text-gray-400'"
                  @click="order = (sort === 'category' && order === 'asc') ? 'desc' : 'asc'; sort = 'category'; $nextTick(() => document.getElementById('sort-trigger').click())">
            categoría
            <span x-show="sort === 'category'" x-text="order === 'asc' ? '↑' : '↓'" class="text-accent"></span>
          </button>
        </th>
        <th class="px-4 py-3 text-left w-[10%]">
          <button type="button"
                  class="flex items-center gap-1 text-xs font-mono uppercase tracking-widest transition-colors"
                  :class="sort === 'created_at' ? 'text-accent' : 'text-gray-600 hover:text-gray-400'"
                  @click="order = (sort === 'created_at' && order === 'asc') ? 'desc' : 'asc'; sort = 'created_at'; $nextTick(() => document.getElementById('sort-trigger').click())">
            fecha
            <span x-show="sort === 'created_at'" x-text="order === 'asc' ? '↑' : '↓'" class="text-accent"></span>
          </button>
        </th>
        <th class="px-4 py-3 text-left w-[7%]"></th>
      </tr>
    </thead>
    <tbody id="cred-table-body" class="divide-y divide-surface-border">
      {% for cred in credentials %}
      {% include "credentials/partials/credential_row.html" %}
      {% endfor %}
    </tbody>
  </table>
</div>

<!-- Móvil: lista tipo bóveda -->
<div class="md:hidden space-y-2 pb-24">
  {% for cred in credentials %}
  {% include "credentials/partials/credential_card.html" %}
  {% endfor %}
</div>

{% else %}
<div class="bg-surface-card/60 backdrop-blur-md border border-surface-border rounded-xl px-4 py-12 text-center">
  <svg class="w-8 h-8 text-gray-700 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
      d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
  </svg>
  <p class="text-gray-500 text-sm">Sin credenciales guardadas.</p>
</div>
{% endif %}
