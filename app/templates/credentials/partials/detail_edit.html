<div class="bg-surface-card border border-surface-border border-l-2 border-l-accent/40 rounded-xl overflow-hidden shadow-sm">
  <form hx-post="/ui/credentials/{{ cred.id }}/detail-save"
        hx-target="#cred-detail"
        hx-swap="innerHTML"
        class="px-5 py-5 space-y-4">
    <input type="hidden" name="project_id" value="{{ cred.project_id or '' }}" />

    <p class="text-xs font-mono text-accent/70 uppercase tracking-widest">— editando credencial</p>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <div>
        <label class="block text-xs font-mono text-gray-500 uppercase tracking-widest mb-1.5">Nombre *</label>
        <input name="label" value="{{ cred.label }}" required
               class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-accent/50 transition-colors" />
      </div>
      <div>
        <label class="block text-xs font-mono text-gray-500 uppercase tracking-widest mb-1.5">URL</label>
        <input name="url" value="{{ cred.url or '' }}" placeholder="https://example.com"
               class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-accent/50 transition-colors" />
      </div>
      <div>
        <label class="block text-xs font-mono text-gray-500 uppercase tracking-widest mb-1.5">Usuario</label>
        <input name="username" value="{{ cred.username or '' }}"
               class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm font-mono text-gray-300 focus:outline-none focus:border-accent/50 transition-colors" />
      </div>
      <div x-data="{ show: false, genPwd() { const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*'; const a=new Uint8Array(20); crypto.getRandomValues(a); this.$refs.pwd.value=Array.from(a,b=>c[b%c.length]).join(''); } }">
        <label class="block text-xs font-mono text-gray-500 uppercase tracking-widest mb-1.5">Contraseña</label>
        <div class="flex items-center bg-surface border border-surface-border rounded-lg focus-within:border-accent/50 transition-colors">
          <input x-ref="pwd" name="password" :type="show ? 'text' : 'password'" value="{{ cred.password or '' }}"
                 autocomplete="new-password"
                 class="flex-1 min-w-0 bg-surface px-3 py-2 text-sm font-mono text-gray-300 focus:outline-none" />
          <div class="flex items-center pr-2 gap-1 shrink-0">
            <button type="button" @click="show = !show" title="mostrar/ocultar"
                    class="p-1 text-gray-600 hover:text-gray-300 transition-colors rounded">
              <svg x-show="!show" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg x-show="show" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
            <button type="button" @click="genPwd()" title="generar contraseña"
                    class="p-1 text-gray-600 hover:text-accent transition-colors rounded">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div>
        <label class="block text-xs font-mono text-gray-500 uppercase tracking-widest mb-1.5">Método de acceso</label>
        <select name="login_via"
                class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-accent/50 transition-colors">
          <option value="email"     {% if cred.login_via == 'email' %}selected{% endif %}>email + contraseña</option>
          <option value="google"    {% if cred.login_via == 'google' %}selected{% endif %}>Google</option>
          <option value="github"    {% if cred.login_via == 'github' %}selected{% endif %}>GitHub</option>
          <option value="microsoft" {% if cred.login_via == 'microsoft' %}selected{% endif %}>Microsoft</option>
          <option value="other"     {% if cred.login_via == 'other' %}selected{% endif %}>otro</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-mono text-gray-500 uppercase tracking-widest mb-1.5">Categoría</label>
        <select name="category"
                class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-accent/50 transition-colors">
          <option value="work"     {% if cred.category == 'work' %}selected{% endif %}>trabajo</option>
          <option value="personal" {% if cred.category == 'personal' %}selected{% endif %}>personal</option>
          <option value="project"  {% if cred.category == 'project' %}selected{% endif %}>proyecto</option>
        </select>
      </div>
    </div>

    <div>
      <label class="block text-xs font-mono text-gray-500 uppercase tracking-widest mb-1.5">Notas</label>
      <textarea name="notes" rows="3"
                class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-400 focus:outline-none focus:border-accent/50 transition-colors resize-none">{{ cred.notes or '' }}</textarea>
    </div>

    <div class="flex gap-2 pt-1">
      <button type="button"
              hx-get="/ui/credentials/{{ cred.id }}/detail-card"
              hx-target="#cred-detail"
              hx-swap="innerHTML"
              class="flex-1 py-2.5 rounded-lg bg-surface border border-surface-border text-xs font-mono text-gray-400 hover:text-gray-100 hover:border-gray-500 transition-colors">
        Cancelar
      </button>
      <button type="submit"
              class="flex-1 py-2.5 rounded-lg bg-accent hover:bg-accent-dim text-xs font-mono font-semibold text-black transition-colors">
        Guardar
      </button>
    </div>

  </form>
</div>
