<tr id="cred-row-{{ cred.id }}" class="bg-surface-hover">
  <td colspan="6" class="px-4 py-4">
    <form hx-post="/ui/credentials/{{ cred.id }}/save"
          hx-target="#cred-row-{{ cred.id }}"
          hx-swap="outerHTML"
          class="space-y-3">
      <input type="hidden" name="project_id" value="{{ cred.project_id or '' }}" />
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-mono text-gray-500 mb-1">nombre *</label>
          <input name="label" value="{{ cred.label }}" required
                 class="w-full bg-surface border border-surface-border rounded px-2 py-1.5 text-xs text-gray-100 focus:outline-none focus:border-accent/60 transition-colors" />
        </div>
        <div>
          <label class="block text-xs font-mono text-gray-500 mb-1">url</label>
          <input name="url" value="{{ cred.url or '' }}"
                 class="w-full bg-surface border border-surface-border rounded px-2 py-1.5 text-xs text-gray-300 focus:outline-none focus:border-accent/60 transition-colors" />
        </div>
        <div>
          <label class="block text-xs font-mono text-gray-500 mb-1">usuario</label>
          <input name="username" value="{{ cred.username or '' }}"
                 class="w-full bg-surface border border-surface-border rounded px-2 py-1.5 text-xs font-mono text-gray-300 focus:outline-none focus:border-accent/60 transition-colors" />
        </div>
        <div x-data="{ show: false, genPwd() { const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*'; const a=new Uint8Array(20); crypto.getRandomValues(a); this.$refs.pwd.value=Array.from(a,b=>c[b%c.length]).join(''); } }">
          <label class="block text-xs font-mono text-gray-500 mb-1">contraseña</label>
          <div class="flex items-center bg-surface border border-surface-border rounded focus-within:border-accent/60 transition-colors">
            <input x-ref="pwd" name="password" :type="show ? 'text' : 'password'" value="{{ cred.password or '' }}"
                   class="flex-1 min-w-0 bg-surface px-2 py-1.5 text-xs font-mono text-gray-300 focus:outline-none" />
            <div class="flex items-center pr-1 gap-0.5 shrink-0">
              <button type="button" @click="show = !show" title="mostrar/ocultar contraseña"
                      class="p-0.5 text-gray-500 hover:text-gray-300 transition-colors rounded">
                <svg x-show="!show" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-3 h-3"><path d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"/><path fill-rule="evenodd" d="M1.38 8.28a.87.87 0 0 1 0-.566 7.003 7.003 0 0 1 13.238.006.87.87 0 0 1 0 .566A7.003 7.003 0 0 1 1.379 8.28ZM11 8a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" clip-rule="evenodd"/></svg>
                <svg x-show="show" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-3 h-3"><path fill-rule="evenodd" d="M3.28 2.22a.75.75 0 0 0-1.06 1.06l.345.345A7.024 7.024 0 0 0 .88 7.434a.87.87 0 0 0 0 .566 7.003 7.003 0 0 0 9.68 4.124l.642.643a.75.75 0 0 0 1.06-1.061L3.28 2.22Zm3.89 5.012 2.828 2.827a1.5 1.5 0 0 1-2.828-2.827Z" clip-rule="evenodd"/><path d="M7.245 1.017a7.003 7.003 0 0 1 7.874 6.42.87.87 0 0 1 0 .566 6.98 6.98 0 0 1-1.449 2.86l-1.08-1.08A5.5 5.5 0 0 0 13.5 8a5.5 5.5 0 0 0-6.255-5.44Zm1.282 2.873 1.386 1.386a1.5 1.5 0 0 0-1.386-1.386Z"/></svg>
              </button>
              <button type="button" @click="genPwd()" title="generar contraseña segura"
                      class="p-0.5 text-gray-500 hover:text-accent transition-colors rounded">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-3 h-3"><path fill-rule="evenodd" d="M13.836 2.477a.75.75 0 0 1 .75.75v3.182a.75.75 0 0 1-.75.75h-3.182a.75.75 0 0 1 0-1.5h1.37l-.84-.841a4.5 4.5 0 0 0-7.08.932.75.75 0 0 1-1.3-.75 6 6 0 0 1 9.44-1.242l.842.84V3.227a.75.75 0 0 1 .75-.75Zm-.911 7.5A.75.75 0 0 1 13.199 11a6 6 0 0 1-9.44 1.241l-.84-.84v1.371a.75.75 0 0 1-1.5 0V9.591a.75.75 0 0 1 .75-.75H5.35a.75.75 0 0 1 0 1.5H3.98l.841.841a4.5 4.5 0 0 0 7.08-.932.75.75 0 0 1 1.024-.273Z" clip-rule="evenodd"/></svg>
              </button>
            </div>
          </div>
        </div>
        <div>
          <label class="block text-xs font-mono text-gray-500 mb-1">método de acceso</label>
          <select name="login_via"
                  class="w-full bg-surface border border-surface-border rounded px-2 py-1.5 text-xs text-gray-400 focus:outline-none focus:border-accent/60 transition-colors">
            <option value="email"     {% if cred.login_via == 'email' %}selected{% endif %}>email + contraseña</option>
            <option value="google"    {% if cred.login_via == 'google' %}selected{% endif %}>google</option>
            <option value="github"    {% if cred.login_via == 'github' %}selected{% endif %}>github</option>
            <option value="microsoft" {% if cred.login_via == 'microsoft' %}selected{% endif %}>microsoft</option>
            <option value="other"     {% if cred.login_via == 'other' %}selected{% endif %}>otro</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-mono text-gray-500 mb-1">categoría</label>
          <select name="category"
                  class="w-full bg-surface border border-surface-border rounded px-2 py-1.5 text-xs text-gray-400 focus:outline-none focus:border-accent/60 transition-colors">
            <option value="work"     {% if cred.category == 'work' %}selected{% endif %}>trabajo</option>
            <option value="personal" {% if cred.category == 'personal' %}selected{% endif %}>personal</option>
            <option value="project"  {% if cred.category == 'project' %}selected{% endif %}>proyecto</option>
          </select>
        </div>
      </div>
      <div>
        <label class="block text-xs font-mono text-gray-500 mb-1">notas</label>
        <textarea name="notes" rows="2"
                  class="w-full bg-surface border border-surface-border rounded px-2 py-1.5 text-xs text-gray-400 focus:outline-none focus:border-accent/60 transition-colors resize-none">{{ cred.notes or '' }}</textarea>
      </div>
      <div class="flex gap-2">
        <button type="submit"
                class="text-xs px-3 py-1 rounded bg-accent hover:bg-accent-dim text-white transition-colors">
          Guardar
        </button>
        <button type="button"
                hx-get="/ui/credentials/{{ cred.id }}/view"
                hx-target="#cred-row-{{ cred.id }}"
                hx-swap="outerHTML"
                class="text-xs px-3 py-1 rounded bg-surface border border-surface-border text-gray-400 hover:text-gray-100 transition-colors">
          Cancelar
        </button>
      </div>
    </form>
  </td>
</tr>
