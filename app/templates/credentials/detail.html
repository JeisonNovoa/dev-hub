{% extends "base.html" %}

{% block title %}{{ cred.label }} — Dev Hub{% endblock %}

{% block content %}

<!-- Breadcrumb -->
<div class="flex items-center gap-2 text-sm font-mono mb-6 border-b border-surface-border pb-4 -mt-2 min-w-0">
  <a href="/credentials" class="flex items-center gap-1.5 text-gray-500 hover:text-gray-300 transition-colors shrink-0">
    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
    </svg>
    credenciales/
  </a>
  <span class="text-gray-600 shrink-0">/</span>
  <span class="text-accent truncate" title="{{ cred.label }}">{{ cred.label }}</span>
</div>

<div id="cred-detail" class="max-w-2xl mx-auto md:mx-0">
  {% include "credentials/partials/detail_card.html" %}
</div>

{% endblock %}
