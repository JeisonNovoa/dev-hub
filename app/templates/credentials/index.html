{% extends "base.html" %}

{% block title %}Credenciales — Dev Hub{% endblock %}

{% block content %}
<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
  <h1 class="text-lg font-mono font-semibold text-gray-100">credenciales/</h1>
  <button onclick="document.getElementById('new-cred-modal').classList.remove('hidden')"
          class="text-sm px-4 py-2 rounded-lg bg-accent/10 border border-accent/30 text-accent hover:bg-accent/20 font-medium transition-colors">
    + nueva credencial
  </button>
</div>

<!-- Filtros -->
<div class="flex flex-col sm:flex-row gap-3 mb-6">
  <input
    type="search"
    placeholder="buscar por nombre o usuario..."
    value="{{ q }}"
    class="flex-1 bg-surface-card border border-surface-border rounded-lg px-4 py-2 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:border-accent/40 transition-colors"
    hx-get="/credentials"
    hx-trigger="input changed delay:300ms"
    hx-target="#cred-table-body"
    hx-swap="innerHTML"
    hx-include="[name='category']"
    name="q"
  />
  <select name="category"
          class="bg-surface-card border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-400 focus:outline-none focus:border-accent/40 transition-colors"
          hx-get="/credentials"
          hx-trigger="change"
          hx-target="#cred-table-body"
          hx-swap="innerHTML"
          hx-include="[name='q']">
    <option value="">todas</option>
    <option value="work"     {% if category_filter == 'work' %}selected{% endif %}>trabajo</option>
    <option value="personal" {% if category_filter == 'personal' %}selected{% endif %}>personal</option>
    <option value="project"  {% if category_filter == 'project' %}selected{% endif %}>proyecto</option>
  </select>
</div>

<!-- Tabla -->
<div class="bg-surface-card border border-surface-border rounded-xl overflow-hidden">
  <table class="w-full text-sm">
    <thead>
      <tr class="border-b border-surface-border">
        <th class="px-4 py-3 text-left text-xs font-mono text-gray-600 uppercase tracking-widest">nombre</th>
        <th class="px-4 py-3 text-left text-xs font-mono text-gray-600 uppercase tracking-widest">usuario</th>
        <th class="px-4 py-3 text-left text-xs font-mono text-gray-600 uppercase tracking-widest">contraseña</th>
        <th class="px-4 py-3 text-left text-xs font-mono text-gray-600 uppercase tracking-widest">url</th>
        <th class="px-4 py-3 text-left text-xs font-mono text-gray-600 uppercase tracking-widest">categoría</th>
        <th class="px-4 py-3 text-left"></th>
      </tr>
    </thead>
    <tbody id="cred-table-body" class="divide-y divide-surface-border">
      {% include "credentials/partials/credential_rows.html" %}
    </tbody>
  </table>
</div>

<!-- Modal nueva credencial -->
<div id="new-cred-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm"
     x-data @click.self="$el.classList.add('hidden')">
  <div class="bg-surface-card border border-surface-border rounded-xl p-6 w-full max-w-md mx-4 shadow-xl"
       x-data="{ loginVia: 'email' }">
    <h2 class="text-base font-mono font-semibold text-gray-100 mb-5">nueva credencial</h2>
    <form action="/ui/credentials/new" method="post" class="space-y-4">
      <div>
        <label class="block text-xs font-mono text-gray-500 mb-1.5">nombre / etiqueta *</label>
        <input name="label" required placeholder="Google cuenta personal"
               class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:border-accent/50 transition-colors" />
      </div>
      <div>
        <label class="block text-xs font-mono text-gray-500 mb-1.5">método de acceso</label>
        <select name="login_via" x-model="loginVia"
                class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-400 focus:outline-none focus:border-accent/50 transition-colors">
          <option value="email">email + contraseña</option>
          <option value="google">google</option>
          <option value="github">github</option>
          <option value="microsoft">microsoft</option>
          <option value="other">otro</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-mono text-gray-500 mb-1.5" x-text="loginVia === 'email' ? 'usuario / email' : 'cuenta usada'"></label>
        <input name="username" placeholder="usuario@email.com"
               class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:border-accent/50 transition-colors font-mono" />
      </div>
      <div x-show="loginVia === 'email'" x-collapse>
        <label class="block text-xs font-mono text-gray-500 mb-1.5">contraseña</label>
        <input name="password" type="password" placeholder="••••••••"
               class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:border-accent/50 transition-colors font-mono" />
      </div>
      <div>
        <label class="block text-xs font-mono text-gray-500 mb-1.5">url de acceso</label>
        <input name="url" placeholder="https://..."
               class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:border-accent/50 transition-colors" />
      </div>
      <div>
        <label class="block text-xs font-mono text-gray-500 mb-1.5">categoría</label>
        <select name="category"
                class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-400 focus:outline-none focus:border-accent/50 transition-colors">
          <option value="work">trabajo</option>
          <option value="personal">personal</option>
        </select>
      </div>
      <div class="flex gap-3 pt-1">
        <button type="submit"
                class="flex-1 py-2 rounded-lg bg-accent hover:bg-accent-dim text-white text-sm font-medium transition-colors">
          Guardar
        </button>
        <button type="button"
                onclick="document.getElementById('new-cred-modal').classList.add('hidden')"
                class="flex-1 py-2 rounded-lg bg-surface border border-surface-border text-gray-400 hover:text-gray-100 text-sm transition-colors">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
