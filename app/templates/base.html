<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Dev Hub{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css?v=1776621132" />

  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js"></script>
  <script src="https://unpkg.com/@alpinejs/collapse@3.14.3/dist/cdn.min.js" defer></script>
  <script src="https://unpkg.com/alpinejs@3.14.3/dist/cdn.min.js" defer></script>
</head>

<body class="bg-surface text-gray-100 min-h-screen antialiased font-sans"
      x-data="{ flash: null }"
      @show-flash.window="flash = $event.detail; setTimeout(() => flash = null, 3000)">

  {% if current_user %}
  <!-- Sidebar -->
  <aside class="fixed top-0 left-0 h-screen w-56 bg-surface-card border-r border-surface-border flex flex-col z-40">
    <!-- Logo -->
    <div class="px-5 py-5 border-b border-surface-border">
      <a href="/" class="flex items-center gap-2 font-mono font-bold text-accent tracking-tight text-sm">
        <span class="text-accent opacity-80 font-mono text-base leading-none">▸</span>
        dev-hub
      </a>
    </div>

    <!-- Nav links -->
    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
      <p class="text-xs font-mono text-gray-600 uppercase tracking-widest px-2 mb-2">Workspace</p>
      <a href="/"
         class="flex items-center gap-2.5 px-2 py-2 rounded-lg text-sm transition-colors
           {% if request.url.path == '/' %}bg-surface border border-surface-border text-gray-100{% else %}text-gray-400 hover:text-gray-100 hover:bg-surface{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
            d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z" />
        </svg>
        Proyectos
      </a>
      <a href="/credentials"
         class="flex items-center gap-2.5 px-2 py-2 rounded-lg text-sm transition-colors
           {% if '/credentials' in request.url.path and '/trash' not in request.url.path %}bg-surface border border-surface-border text-gray-100{% else %}text-gray-400 hover:text-gray-100 hover:bg-surface{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
            d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
        </svg>
        Credenciales
      </a>
      <a href="/trash"
         class="flex items-center justify-between gap-2.5 px-2 py-2 rounded-lg text-sm transition-colors
           {% if request.url.path == '/trash' %}bg-surface border border-surface-border text-gray-100{% else %}text-gray-400 hover:text-gray-100 hover:bg-surface{% endif %}">
        <span class="flex items-center gap-2.5">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
          Papelera
        </span>
        <span hx-get="/ui/trash/count"
              hx-trigger="load"
              hx-swap="innerHTML"
              hx-target="this"></span>
      </a>
    </nav>

    <!-- User footer -->
    <div class="px-4 py-4 border-t border-surface-border flex items-center justify-between gap-2">
      <div class="flex items-center gap-2 min-w-0">
        <div class="w-6 h-6 rounded-full bg-accent/20 border border-accent/30 flex items-center justify-center shrink-0">
          <span class="text-xs font-mono text-accent font-semibold leading-none">
            {{ current_user.email[0] | upper }}{{ current_user.email[1] | upper }}
          </span>
        </div>
        <div class="min-w-0">
          <p class="text-xs text-gray-400 truncate leading-tight">{{ current_user.email }}</p>
          <p class="text-xs text-gray-600 leading-tight">local</p>
        </div>
      </div>
      <form method="post" action="/logout" class="shrink-0">
        <button type="submit" title="Salir"
                class="p-1.5 rounded-md text-gray-600 hover:text-gray-300 hover:bg-surface transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </form>
    </div>
  </aside>
  {% endif %}

  <!-- Flash notification -->
  <div x-cloak x-show="flash" x-transition
       class="fixed top-4 right-4 z-50 px-4 py-3 rounded-lg text-sm font-medium shadow-lg"
       :class="flash?.type === 'error' ? 'bg-red-900 text-red-200' : 'bg-green-900 text-green-200'"
       x-text="flash?.message">
  </div>

  <!-- Main content -->
  <main class="min-h-screen px-8 py-8 {% if current_user %}ml-56{% endif %}">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
