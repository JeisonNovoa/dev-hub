<div id="link-new" class="px-5 py-3 bg-surface-hover">
  <form hx-post="/ui/projects/{{ slug }}/links/new"
        hx-target="#link-new"
        hx-swap="outerHTML"
        class="space-y-2">
    <div class="flex gap-2">
      <input name="label" required autofocus
             placeholder="Etiqueta (ej: Dashboard)"
             class="flex-1 bg-surface border border-surface-border rounded px-2 py-1 text-xs text-gray-300 focus:outline-none focus:border-accent/60" />
      <select name="category"
              class="bg-surface border border-surface-border rounded px-2 py-1 text-xs text-gray-400 focus:outline-none focus:border-accent/60">
        {% for cat in ['dashboard','docs','repo','staging','prod','other'] %}
        <option value="{{ cat }}">{{ cat }}</option>
        {% endfor %}
      </select>
    </div>
    <input name="url" required type="url"
           placeholder="https://..."
           class="w-full bg-surface border border-surface-border rounded px-2 py-1 text-xs text-gray-300 focus:outline-none focus:border-accent/60" />
    <div class="flex gap-2">
      <button type="submit"
              class="text-xs px-3 py-1 rounded bg-accent hover:bg-accent-dim text-white transition-colors">
        Agregar
      </button>
      <button type="button"
              onclick="this.closest('#link-new').remove()"
              class="text-xs px-3 py-1 rounded bg-surface border border-surface-border text-gray-400 hover:text-gray-100 transition-colors">
        Cancelar
      </button>
    </div>
  </form>
</div>
