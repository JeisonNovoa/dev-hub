<div id="notes-section" class="bg-surface-card border border-surface-border rounded-xl overflow-hidden">
  <div class="flex items-center justify-between px-5 py-3 border-b border-surface-border">
    <h2 class="flex items-center gap-2 text-xs font-mono font-semibold text-gray-500 uppercase tracking-widest">
      <span class="text-accent opacity-60">▸</span>
      notas
    </h2>
    <span class="text-xs text-gray-600 font-mono">Markdown soportado</span>
  </div>

  <div class="px-5 py-4" x-data="{ tab: 'write' }">

    <!-- Tab switcher -->
    <div class="flex gap-1 mb-3">
      <button type="button" @click="tab = 'write'"
              :class="tab === 'write' ? 'bg-surface text-gray-100 border-surface-border' : 'text-gray-500 hover:text-gray-300 border-transparent'"
              class="text-xs font-mono px-3 py-1 rounded-md border transition-colors">
        editor
      </button>
      <button type="button" @click="tab = 'preview'"
              :class="tab === 'preview' ? 'bg-surface text-gray-100 border-surface-border' : 'text-gray-500 hover:text-gray-300 border-transparent'"
              class="text-xs font-mono px-3 py-1 rounded-md border transition-colors">
        preview
      </button>
    </div>

    <form hx-post="/ui/projects/{{ project.slug }}/notes/save"
          hx-target="#notes-section"
          hx-swap="outerHTML"
          class="space-y-3">

      <!-- Editor -->
      <div :class="tab === 'write' ? '' : 'hidden'">
        <textarea id="notes-textarea" name="notes" rows="14"
                  class="w-full bg-surface border border-surface-border rounded-lg px-3 py-3 text-sm text-gray-300 font-mono focus:outline-none focus:border-accent/60 resize-y leading-relaxed">{{ project.notes or '' }}</textarea>
      </div>

      <!-- Preview -->
      <div :class="tab === 'preview' ? '' : 'hidden'"
           class="bg-surface border border-surface-border rounded-lg px-5 py-4 min-h-48">
        <p class="text-gray-600 text-sm italic"
           x-show="!document.getElementById('notes-textarea')?.value?.trim()">
          Sin contenido aún.
        </p>
        <div class="notes-content"
             x-html="window.marked?.parse
               ? window.marked.parse(document.getElementById('notes-textarea')?.value || '')
               : (document.getElementById('notes-textarea')?.value || '')">
        </div>
      </div>

      <div class="flex gap-2 pt-1">
        <button type="button"
                hx-get="/ui/projects/{{ project.slug }}/notes/view"
                hx-target="#notes-section"
                hx-swap="outerHTML"
                class="flex-1 py-2 rounded-lg bg-surface border border-surface-border text-xs font-mono text-gray-400 hover:text-gray-100 hover:border-gray-500 transition-colors">
          Cancelar
        </button>
        <button type="submit"
                class="flex-1 py-2 rounded-lg bg-accent hover:bg-accent-dim text-xs font-mono font-semibold text-black transition-colors">
          Guardar
        </button>
      </div>
    </form>
  </div>
</div>
