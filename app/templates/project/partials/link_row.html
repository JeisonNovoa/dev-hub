<div id="link-row-{{ link.id }}" class="px-5 py-3 flex items-center justify-between gap-3 group">
  <div class="flex items-center gap-3 min-w-0">
    <span class="text-xs px-1.5 py-0.5 rounded font-mono bg-surface border border-surface-border text-gray-600 shrink-0">
      {{ link.category }}
    </span>
    <a href="{{ link.url }}" target="_blank" rel="noopener"
       class="text-sm text-accent hover:text-accent/80 hover:underline truncate transition-colors">
      {{ link.label }}
    </a>
    <span class="text-xs text-gray-700 truncate hidden sm:block">{{ link.url | truncate(40) }}</span>
  </div>
  <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity shrink-0" x-data="{ copied: false }">
    <!-- Copy URL -->
    <button @click="navigator.clipboard.writeText('{{ link.url }}'); copied = true; setTimeout(() => copied = false, 2000)"
            class="transition-all p-1 rounded"
            :class="copied ? 'text-accent scale-110' : 'text-gray-600 hover:text-accent hover:bg-surface'"
            title="Copiar URL">
      <svg x-show="!copied" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
      </svg>
      <svg x-show="copied" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
      </svg>
    </button>
    <button
      hx-get="/ui/projects/{{ project.slug }}/links/{{ link.id }}/edit"
      hx-target="#link-row-{{ link.id }}"
      hx-swap="outerHTML"
      class="text-gray-600 hover:text-accent transition-colors p-1 rounded hover:bg-surface">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
      </svg>
    </button>
    <button
      hx-delete="/api/projects/{{ project.slug }}/links/{{ link.id }}"
      hx-target="#link-row-{{ link.id }}"
      hx-swap="outerHTML"
      hx-confirm="¿Eliminar este link?"
      class="text-gray-600 hover:text-red-400 transition-colors p-1 rounded hover:bg-surface">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
</div>
