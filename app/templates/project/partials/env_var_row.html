<div id="env-var-row-{{ env_var.id }}" class="px-5 py-3 flex items-start gap-3 group"
     x-data="{ confirming: false }" @mouseleave="confirming = false">
  <div class="flex-1 min-w-0">
    <div class="flex items-center gap-2 mb-1">
      <span class="font-mono text-xs text-accent">{{ env_var.key }}</span>
      {% if env_var.description %}
      <span class="text-xs text-gray-600">— {{ env_var.description }}</span>
      {% endif %}
    </div>
    <div class="flex items-center gap-2" x-data="{ shown: false, copied: false }">
      <span class="font-mono text-xs text-gray-400" x-text="shown ? '{{ env_var.value or '' }}' : '•••••••••••••'"></span>
      {% if env_var.value %}
      <!-- Toggle show/hide -->
      <button @click="shown = !shown"
              class="opacity-0 group-hover:opacity-100 transition-all text-gray-600 hover:text-gray-300 shrink-0"
              :title="shown ? 'Ocultar' : 'Mostrar'">
        <svg x-show="!shown" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg>
        <svg x-show="shown" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
        </svg>
      </button>
      <!-- Copy button -->
      <button @click="navigator.clipboard.writeText('{{ env_var.value }}'); copied = true; setTimeout(() => copied = false, 2000)"
              class="opacity-0 group-hover:opacity-100 transition-all shrink-0"
              :class="copied ? 'text-accent scale-110' : 'text-gray-600 hover:text-accent'"
              title="Copiar valor">
        <svg x-show="!copied" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
        </svg>
        <svg x-show="copied" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
      </button>
      {% endif %}
    </div>
  </div>
  <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity shrink-0">
    <button
      hx-get="/ui/projects/{{ project.slug }}/env-vars/{{ env_var.id }}/edit"
      hx-target="#env-var-row-{{ env_var.id }}"
      hx-swap="outerHTML"
      class="text-gray-600 hover:text-accent transition-colors p-1 rounded hover:bg-surface">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125" />
      </svg>
    </button>
    <button x-show="!confirming" @click.stop="confirming = true"
            class="text-gray-600 hover:text-red-400 transition-colors p-1 rounded hover:bg-surface">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
    <button x-show="confirming" style="display:none"
            hx-delete="/api/projects/{{ project.slug }}/env-vars/{{ env_var.id }}"
            hx-target="#env-var-row-{{ env_var.id }}"
            hx-swap="outerHTML"
            class="text-xs font-mono px-2 py-1 rounded bg-red-900/40 border border-red-700/40 text-red-400 hover:bg-red-900/70 transition-colors">
      confirmar
    </button>
  </div>
</div>
