<div id="service-row-{{ service.id }}" class="border-l-2 border-l-accent/40 bg-surface-card mx-1 my-1 rounded-r-xl">
  <form hx-put="/api/services/{{ service.id }}"
        hx-target="#service-row-{{ service.id }}"
        hx-swap="outerHTML"
        hx-ext="json-enc"
        class="px-4 py-4 space-y-3">

    <p class="text-xs font-mono text-accent/70 uppercase tracking-widest">— editando servicio</p>

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-xs font-mono text-gray-500 uppercase tracking-widest mb-1.5">Nombre *</label>
        <input name="name" value="{{ service.name }}" required
               class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-accent/50 transition-colors" />
      </div>
      <div>
        <label class="block text-xs font-mono text-gray-500 uppercase tracking-widest mb-1.5">Tipo</label>
        <select name="category"
                class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-accent/50 transition-colors">
          {% for cat in ['ai','auth','storage','db','deploy','messaging','monitoring','other'] %}
          <option value="{{ cat }}" {% if service.category == cat %}selected{% endif %}>{{ cat }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div>
      <label class="block text-xs font-mono text-gray-500 uppercase tracking-widest mb-1.5">URL</label>
      <input name="url" value="{{ service.url or '' }}" type="url"
             placeholder="https://dashboard.example.com"
             class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-accent/50 transition-colors" />
    </div>

    <div>
      <label class="block text-xs font-mono text-gray-500 uppercase tracking-widest mb-1.5">Notas</label>
      <input name="notes" value="{{ service.notes or '' }}"
             placeholder="Plan, cuenta, límites..."
             class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-accent/50 transition-colors" />
    </div>

    <div class="flex gap-2 pt-1">
      <button type="button"
              hx-get="/ui/projects/{{ project.slug }}/services/{{ service.id }}/view"
              hx-target="#service-row-{{ service.id }}"
              hx-swap="outerHTML"
              class="flex-1 py-2 rounded-lg bg-surface border border-surface-border text-xs font-mono text-gray-400 hover:text-gray-100 hover:border-gray-500 transition-colors">
        Cancelar
      </button>
      <button type="submit"
              class="flex-1 py-2 rounded-lg bg-accent hover:bg-accent-dim text-xs font-mono font-semibold text-black transition-colors">
        Guardar
      </button>
    </div>

  </form>
</div>
