<div id="service-row-{{ service.id }}" class="px-5 py-4 border-b border-surface-border bg-surface-hover">
  <form hx-put="/api/services/{{ service.id }}"
        hx-target="#service-row-{{ service.id }}"
        hx-swap="outerHTML"
        hx-ext="json-enc"
        class="space-y-3">

    <p class="text-xs font-mono font-semibold text-gray-500 uppercase tracking-widest">editar servicio</p>

    <div class="flex gap-2">
      <div class="flex-1">
        <label class="block text-xs text-gray-600 font-mono mb-1">Nombre</label>
        <input name="name" value="{{ service.name }}" required
               class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-accent/50 transition-colors" />
      </div>
      <div>
        <label class="block text-xs text-gray-600 font-mono mb-1">Tipo</label>
        <select name="category"
                class="bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-400 focus:outline-none focus:border-accent/50 transition-colors">
          {% for cat in ['ai','auth','storage','db','deploy','messaging','monitoring','other'] %}
          <option value="{{ cat }}" {% if service.category == cat %}selected{% endif %}>{{ cat }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div>
      <label class="block text-xs text-gray-600 font-mono mb-1">URL <span class="text-gray-700">(opcional)</span></label>
      <input name="url" value="{{ service.url or '' }}" type="url"
             placeholder="https://dashboard.openai.com"
             class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-accent/50 transition-colors" />
    </div>

    <div>
      <label class="block text-xs text-gray-600 font-mono mb-1">Notas <span class="text-gray-700">(opcional)</span></label>
      <input name="notes" value="{{ service.notes or '' }}"
             placeholder="Plan, cuenta, límites..."
             class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-accent/50 transition-colors" />
    </div>

    <div class="flex gap-2 pt-1">
      <button type="button"
              hx-get="/ui/projects/{{ project.slug }}/services/{{ service.id }}/view"
              hx-target="#service-row-{{ service.id }}"
              hx-swap="outerHTML"
              class="flex-1 text-sm font-mono px-3 py-2 rounded-lg bg-surface border border-surface-border text-gray-400 hover:text-gray-100 hover:border-gray-500 transition-colors">
        Cancelar
      </button>
      <button type="submit"
              class="flex-1 text-sm font-mono font-semibold px-3 py-2 rounded-lg bg-accent hover:bg-accent-dim text-black transition-colors">
        Guardar
      </button>
    </div>

  </form>
</div>
