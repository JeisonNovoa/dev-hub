<div id="project-header" class="group">
  <h1 class="text-2xl font-bold text-gray-100">{{ project.name }}</h1>
  {% if project.description %}
  <p class="text-gray-400 mt-1">{{ project.description }}</p>
  {% else %}
  <p class="text-gray-600 mt-1 text-sm italic">Sin descripción — haz click en editar para agregar una.</p>
  {% endif %}
  <!-- Tech stack badges -->
  {% if project.tech_stack %}
  <div class="flex flex-wrap gap-1.5 mt-3">
    {% for tech in project.tech_stack %}
    <span class="text-xs px-2 py-0.5 rounded bg-surface-card border border-surface-border text-gray-400">{{ tech }}</span>
    {% endfor %}
  </div>
  {% endif %}
  <div class="mt-3 flex items-center gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
    <button
      hx-get="/ui/projects/{{ project.slug }}/header/edit"
      hx-target="#project-header"
      hx-swap="outerHTML"
      class="flex items-center gap-1.5 text-xs font-mono text-gray-600 hover:text-accent transition-colors">
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125" />
      </svg>
      editar
    </button>
    <button
      hx-post="/ui/projects/{{ project.slug }}/trash"
      hx-confirm="¿Mover '{{ project.name }}' a la papelera?"
      class="flex items-center gap-1.5 text-xs font-mono text-gray-600 hover:text-red-400 transition-colors">
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
      </svg>
      papelera
    </button>
  </div>
</div>
