<div id="proj-cred-new" class="px-5 py-3 bg-surface-hover" x-data="{ loginVia: 'email' }">
  <form hx-post="/ui/projects/{{ slug }}/credentials/new"
        hx-target="#proj-cred-new"
        hx-swap="outerHTML"
        class="space-y-2">
    <div class="grid grid-cols-2 gap-2">
      <div>
        <label class="block text-xs font-mono text-gray-500 mb-1">nombre *</label>
        <input name="label" required autofocus
               placeholder="Ej: Vercel, Supabase..."
               class="w-full bg-surface border border-surface-border rounded px-2 py-1.5 text-xs text-gray-100 focus:outline-none focus:border-accent/60 transition-colors" />
      </div>
      <div>
        <label class="block text-xs font-mono text-gray-500 mb-1">método</label>
        <select name="login_via" x-model="loginVia"
                class="w-full bg-surface border border-surface-border rounded px-2 py-1.5 text-xs text-gray-400 focus:outline-none focus:border-accent/60 transition-colors">
          <option value="email">email + contraseña</option>
          <option value="google">google</option>
          <option value="github">github</option>
          <option value="microsoft">microsoft</option>
          <option value="other">otro</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-mono text-gray-500 mb-1">usuario</label>
        <input name="username" placeholder="usuario@email.com"
               class="w-full bg-surface border border-surface-border rounded px-2 py-1.5 text-xs font-mono text-gray-300 focus:outline-none focus:border-accent/60 transition-colors" />
      </div>
      <div x-show="loginVia === 'email'">
        <label class="block text-xs font-mono text-gray-500 mb-1">contraseña</label>
        <input name="password" type="password" placeholder="••••••••"
               class="w-full bg-surface border border-surface-border rounded px-2 py-1.5 text-xs font-mono text-gray-300 focus:outline-none focus:border-accent/60 transition-colors" />
      </div>
      <div class="col-span-2">
        <label class="block text-xs font-mono text-gray-500 mb-1">url</label>
        <input name="url" placeholder="https://..."
               class="w-full bg-surface border border-surface-border rounded px-2 py-1.5 text-xs text-gray-300 focus:outline-none focus:border-accent/60 transition-colors" />
      </div>
    </div>
    <div class="flex gap-2">
      <button type="submit"
              class="text-xs px-3 py-1 rounded bg-accent hover:bg-accent-dim text-white transition-colors">
        Agregar
      </button>
      <button type="button"
              onclick="this.closest('#proj-cred-new').remove()"
              class="text-xs px-3 py-1 rounded bg-surface border border-surface-border text-gray-400 hover:text-gray-100 transition-colors">
        Cancelar
      </button>
    </div>
  </form>
</div>
