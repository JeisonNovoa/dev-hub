<div id="proj-cred-new" class="px-5 py-4 border-b border-surface-border"
     x-data="{ loginVia: 'email' }">
  <form hx-post="/ui/projects/{{ slug }}/credentials/new"
        hx-target="#proj-cred-new"
        hx-swap="outerHTML"
        class="space-y-3">

    <p class="text-xs font-mono font-semibold text-gray-500 uppercase tracking-widest">nueva credencial</p>

    <div class="flex gap-2">
      <div class="flex-1">
        <label class="block text-xs text-gray-600 font-mono mb-1">Nombre</label>
        <input name="label" required autofocus
               placeholder="ej: Vercel, Supabase..."
               class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-accent/50 transition-colors" />
      </div>
      <div>
        <label class="block text-xs text-gray-600 font-mono mb-1">Método</label>
        <select name="login_via" x-model="loginVia"
                class="bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-400 focus:outline-none focus:border-accent/50 transition-colors">
          <option value="email">email + pass</option>
          <option value="google">google</option>
          <option value="github">github</option>
          <option value="microsoft">microsoft</option>
          <option value="other">otro</option>
        </select>
      </div>
    </div>

    <div>
      <label class="block text-xs text-gray-600 font-mono mb-1">Usuario</label>
      <input name="username" placeholder="usuario@email.com"
             class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm font-mono text-gray-300 focus:outline-none focus:border-accent/50 transition-colors" />
    </div>

    <div x-show="loginVia === 'email'"
         x-data="{ show: false, genPwd() { const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*'; const a=new Uint8Array(20); crypto.getRandomValues(a); this.$refs.pwd.value=Array.from(a,b=>c[b%c.length]).join(''); this.show=true; } }">
      <label class="block text-xs text-gray-600 font-mono mb-1">Contraseña</label>
      <div class="flex items-center bg-surface border border-surface-border rounded-lg px-3 py-2 focus-within:border-accent/50 transition-colors">
        <input x-ref="pwd" name="password" :type="show ? 'text' : 'password'" placeholder="••••••••"
               class="flex-1 min-w-0 w-0 bg-surface text-sm font-mono text-gray-300 focus:outline-none [color-scheme:dark]" />
        <div class="flex items-center gap-1 shrink-0 ml-2">
          <button type="button" @click="show = !show" title="mostrar/ocultar"
                  class="text-gray-500 hover:text-gray-300 transition-colors p-0.5 rounded">
            <svg x-show="!show" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <svg x-show="show" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
            </svg>
          </button>
          <button type="button" @click="genPwd()" title="generar contraseña segura"
                  class="text-gray-500 hover:text-accent transition-colors p-0.5 rounded">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div>
      <label class="block text-xs text-gray-600 font-mono mb-1">URL <span class="text-gray-700">(opcional)</span></label>
      <input name="url" type="url" placeholder="https://..."
             class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-accent/50 transition-colors" />
    </div>

    <div class="flex gap-2 pt-1">
      <button type="button"
              onclick="this.closest('#proj-cred-new').remove()"
              class="flex-1 text-sm font-mono px-3 py-2 rounded-lg bg-surface border border-surface-border text-gray-400 hover:text-gray-100 hover:border-gray-500 transition-colors">
        Cancelar
      </button>
      <button type="submit"
              class="flex-1 text-sm font-mono font-semibold px-3 py-2 rounded-lg bg-accent hover:bg-accent-dim text-black transition-colors">
        Agregar
      </button>
    </div>

  </form>
</div>
