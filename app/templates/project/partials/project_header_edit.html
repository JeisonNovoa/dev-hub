<div id="project-header" class="bg-surface-hover rounded-xl p-4 -mx-1">
  <form hx-post="/ui/projects/{{ project.slug }}/header/save"
        hx-target="#project-header"
        hx-swap="outerHTML"
        class="space-y-3">
    <div>
      <label class="block text-xs text-gray-500 mb-1">Nombre</label>
      <input name="name" value="{{ project.name }}" required
             class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-base font-bold text-gray-100 focus:outline-none focus:border-accent/60" />
    </div>
    <div>
      <label class="block text-xs text-gray-500 mb-1">Descripción</label>
      <input name="description" value="{{ project.description or '' }}"
             placeholder="Breve descripción del proyecto..."
             class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-accent/60" />
    </div>
    <div>
      <label class="block text-xs text-gray-500 mb-1">Tech stack <span class="text-gray-600">(separado por comas)</span></label>
      <input name="tech_stack_raw" value="{{ project.tech_stack | join(', ') }}"
             placeholder="FastAPI, React, PostgreSQL, Redis..."
             class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-accent/60" />
    </div>
    <div class="flex gap-2 pt-1">
      <button type="submit"
              class="text-xs px-4 py-1.5 rounded-lg bg-accent hover:bg-accent-dim text-white font-medium transition-colors">
        Guardar
      </button>
      <button type="button"
              hx-get="/ui/projects/{{ project.slug }}/header/view"
              hx-target="#project-header"
              hx-swap="outerHTML"
              class="text-xs px-4 py-1.5 rounded-lg bg-surface border border-surface-border text-gray-400 hover:text-gray-100 transition-colors">
        Cancelar
      </button>
    </div>
  </form>
</div>
