<div id="repo-card-{{ repo.id }}" class="border border-surface-border rounded-xl bg-surface-hover p-4">
  <form hx-put="/api/projects/{{ project.slug }}/repos/{{ repo.slug }}"
        hx-target="#repo-card-{{ repo.id }}"
        hx-swap="outerHTML"
        hx-ext="json-enc"
        class="space-y-2">
    <input name="name" value="{{ repo.name }}" required
           placeholder="Nombre"
           class="w-full bg-surface border border-surface-border rounded px-2 py-1 text-xs font-semibold text-gray-200 focus:outline-none focus:border-accent/60" />
    <input name="local_path" value="{{ repo.local_path or '' }}"
           placeholder="Ruta local"
           class="w-full bg-surface border border-surface-border rounded px-2 py-1 text-xs font-mono text-gray-400 focus:outline-none focus:border-accent/60" />
    <input name="github_url" value="{{ repo.github_url or '' }}" type="url"
           placeholder="URL GitHub"
           class="w-full bg-surface border border-surface-border rounded px-2 py-1 text-xs text-gray-300 focus:outline-none focus:border-accent/60" />
    <input name="description" value="{{ repo.description or '' }}"
           placeholder="Descripción"
           class="w-full bg-surface border border-surface-border rounded px-2 py-1 text-xs text-gray-400 focus:outline-none focus:border-accent/60" />
    <div class="flex gap-2">
      <button type="submit"
              class="text-xs px-3 py-1 rounded bg-accent hover:bg-accent-dim text-white transition-colors">
        Guardar
      </button>
      <button type="button"
              hx-get="/ui/projects/{{ project.slug }}/repos/{{ repo.id }}/view"
              hx-target="#repo-card-{{ repo.id }}"
              hx-swap="outerHTML"
              class="text-xs px-3 py-1 rounded bg-surface border border-surface-border text-gray-400 hover:text-gray-100 transition-colors">
        Cancelar
      </button>
    </div>
  </form>
</div>
