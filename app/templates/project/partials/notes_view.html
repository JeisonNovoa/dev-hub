<div id="notes-section" class="bg-surface-card border border-surface-border rounded-xl overflow-hidden">
  <div class="flex items-center justify-between px-5 py-3 border-b border-surface-border">
    <h2 class="flex items-center gap-2 text-xs font-mono font-semibold text-gray-500 uppercase tracking-widest">
      <span class="text-accent opacity-60">▸</span>
      notas
    </h2>
    <button
      hx-get="/ui/projects/{{ project.slug }}/notes/edit"
      hx-target="#notes-section"
      hx-swap="outerHTML"
      class="flex items-center gap-1.5 text-xs font-mono px-2.5 py-1 rounded-lg border border-surface-border text-gray-400 hover:text-gray-100 hover:border-gray-500 transition-colors">
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125" />
      </svg>
      editar
    </button>
  </div>
  <div class="px-5 py-4">
    {% if project.notes %}
    <div class="bg-surface border border-surface-border rounded-lg px-5 py-4">
      <div class="notes-content">
        {{ project.notes | markdown | safe }}
      </div>
    </div>
    {% else %}
    <div class="flex flex-col items-center justify-center py-8 text-center">
      <svg class="w-8 h-8 text-gray-700 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
      <p class="text-sm text-gray-600 mb-3">Sin notas aún.</p>
      <button
        hx-get="/ui/projects/{{ project.slug }}/notes/edit"
        hx-target="#notes-section"
        hx-swap="outerHTML"
        class="text-xs font-mono px-3 py-1.5 rounded-lg bg-accent/10 border border-accent/20 text-accent hover:bg-accent/20 transition-colors">
        + agregar notas
      </button>
    </div>
    {% endif %}
  </div>
</div>
