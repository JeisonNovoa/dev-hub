<div id="cmd-row-{{ cmd.id }}" class="px-5 py-3 flex items-start gap-3 group">
  <span class="shrink-0 w-5 h-5 rounded-full bg-surface border border-surface-border text-xs font-mono text-gray-500 flex items-center justify-center mt-0.5">
    {{ cmd.order + 1 }}
  </span>
  <div class="flex-1 min-w-0">
    {% if cmd.label %}
    <div class="text-xs text-gray-600 mb-1 font-sans">{{ cmd.label }}</div>
    {% endif %}
    <div class="flex items-center gap-2" x-data="{ copied: false }">
      <code class="font-mono text-xs text-accent bg-surface rounded px-2 py-1.5 flex-1 overflow-x-auto">{{ cmd.command }}</code>
      <button @click="navigator.clipboard.writeText('{{ cmd.command }}'); copied = true; setTimeout(() => copied = false, 2000)"
              class="opacity-0 group-hover:opacity-100 transition-all shrink-0 p-1 rounded"
              :class="copied ? 'text-accent scale-110' : 'text-gray-600 hover:text-accent hover:bg-surface'"
              title="Copiar comando">
        <svg x-show="!copied" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
        </svg>
        <svg x-show="copied" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
      </button>
    </div>
  </div>
  <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity shrink-0">
    <button
      hx-get="/ui/projects/{{ project.slug }}/commands/{{ cmd.id }}/edit"
      hx-target="#cmd-row-{{ cmd.id }}"
      hx-swap="outerHTML"
      class="text-gray-600 hover:text-accent transition-colors p-1 rounded hover:bg-surface">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
      </svg>
    </button>
    <button
      hx-delete="/api/projects/{{ project.slug }}/commands/{{ cmd.id }}"
      hx-target="#cmd-row-{{ cmd.id }}"
      hx-swap="outerHTML"
      hx-confirm="¿Eliminar este comando?"
      class="text-gray-600 hover:text-red-400 transition-colors p-1 rounded hover:bg-surface">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
</div>
