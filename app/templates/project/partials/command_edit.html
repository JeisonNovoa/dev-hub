<div id="cmd-row-{{ cmd.id }}" class="border-l-2 border-l-accent/40 bg-surface-card mx-1 my-0.5 rounded-r-xl">
  <form hx-put="/api/projects/{{ project.slug }}/commands/{{ cmd.id }}"
        hx-target="#cmd-row-{{ cmd.id }}"
        hx-swap="outerHTML"
        hx-ext="json-enc"
        class="px-4 py-3 space-y-3">

    <p class="text-xs font-mono text-accent/70 uppercase tracking-widest">— editando comando</p>

    <div class="grid grid-cols-3 gap-3">
      <div class="col-span-2">
        <label class="block text-xs font-mono text-gray-500 uppercase tracking-widest mb-1.5">Etiqueta *</label>
        <input name="label" value="{{ cmd.label }}"
               placeholder="npm dev"
               class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-accent/50 transition-colors" />
      </div>
      <div>
        <label class="block text-xs font-mono text-gray-500 uppercase tracking-widest mb-1.5">Orden</label>
        <input name="order" type="number" value="{{ cmd.order }}"
               class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-400 focus:outline-none focus:border-accent/50 transition-colors" />
      </div>
    </div>

    <div>
      <label class="block text-xs font-mono text-gray-500 uppercase tracking-widest mb-1.5">Tipo</label>
      <select name="type"
              class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-accent/50 transition-colors">
        <option value="start"     {% if cmd.type == 'start' %}selected{% endif %}>inicio</option>
        <option value="migration" {% if cmd.type == 'migration' %}selected{% endif %}>migración</option>
        <option value="build"     {% if cmd.type == 'build' %}selected{% endif %}>build</option>
        <option value="other"     {% if cmd.type == 'other' %}selected{% endif %}>otro</option>
      </select>
    </div>

    <div>
      <label class="block text-xs font-mono text-gray-500 uppercase tracking-widest mb-1.5">Comando *</label>
      <textarea name="command" rows="2"
                class="w-full bg-surface border border-surface-border rounded-lg px-3 py-2 text-sm font-mono text-green-400 focus:outline-none focus:border-accent/50 transition-colors resize-none">{{ cmd.command }}</textarea>
    </div>

    <div class="flex gap-2 pt-1">
      <button type="button"
              hx-get="/ui/projects/{{ project.slug }}/commands/{{ cmd.id }}/view"
              hx-target="#cmd-row-{{ cmd.id }}"
              hx-swap="outerHTML"
              class="flex-1 py-2 rounded-lg bg-surface border border-surface-border text-xs font-mono text-gray-400 hover:text-gray-100 hover:border-gray-500 transition-colors">
        Cancelar
      </button>
      <button type="submit"
              class="flex-1 py-2 rounded-lg bg-accent hover:bg-accent-dim text-xs font-mono font-semibold text-black transition-colors">
        Guardar
      </button>
    </div>

  </form>
</div>
