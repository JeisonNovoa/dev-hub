{% extends "base.html" %}
{% block title %}Verificación — Dev Hub{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
  <div class="w-full max-w-sm">

    <h1 class="text-xl font-semibold font-mono text-gray-100 mb-2 text-center">
      <span class="text-accent">▸</span> dev-hub
    </h1>
    <p class="text-sm text-gray-500 text-center mb-6">Verificación en dos pasos</p>

    {% if error %}
    <div class="mb-4 px-4 py-3 rounded-lg bg-red-900/50 border border-red-700 text-red-300 text-sm">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login/2fa" class="space-y-4">
      <input type="hidden" name="pending_token" value="{{ pending_token }}" />
      <div>
        <label class="block text-xs text-gray-400 mb-1.5" for="code">Código de tu app de autenticación</label>
        <input
          id="code" name="code" type="text" inputmode="numeric" pattern="[0-9]*"
          maxlength="6" required autofocus autocomplete="one-time-code"
          class="w-full px-3 py-2 rounded-md bg-surface border border-surface-border text-gray-100
                 text-center text-lg tracking-[0.4em] font-mono placeholder-gray-600
                 focus:outline-none focus:border-accent transition-colors"
          placeholder="••••••"
        />
      </div>
      <button type="submit"
              class="w-full py-2 rounded-md bg-accent hover:bg-accent-dim text-black text-sm font-semibold transition-colors">
        Verificar
      </button>
      <p class="text-xs text-gray-600 text-center">
        <a href="/login" class="hover:text-gray-400 transition-colors">← volver al login</a>
      </p>
    </form>

  </div>
</div>
{% endblock %}
