<div class="px-5 py-4 border-t border-surface-border bg-accent/5" x-data="{ copied: false }">
  <div class="flex items-start gap-2.5">
    <svg class="w-4 h-4 text-accent shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
    </svg>
    <div class="flex-1 min-w-0">
      <p class="text-sm text-gray-200 font-medium">Token «{{ name }}» generado</p>
      <p class="text-xs text-gray-500 mt-0.5">
        Cópialo ahora — no se vuelve a mostrar. Expira el {{ expires_at.strftime('%Y-%m-%d') }}.
      </p>

      <div class="flex items-center gap-2 mt-3">
        <code id="generated-token-value"
              class="flex-1 min-w-0 truncate font-mono text-xs text-accent bg-surface border border-surface-border rounded-lg px-3 py-2">{{ token }}</code>
        <button type="button"
                @click="navigator.clipboard.writeText(document.getElementById('generated-token-value').textContent); copied = true; setTimeout(() => copied = false, 2000)"
                class="shrink-0 flex items-center gap-1.5 text-xs font-mono px-3 py-2 rounded-lg border transition-colors"
                :class="copied ? 'border-accent/40 bg-accent/10 text-accent' : 'border-surface-border bg-surface text-gray-400 hover:text-accent hover:border-accent/30'">
          <svg x-show="!copied" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
          </svg>
          <svg x-show="copied" style="display:none" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
          <span x-text="copied ? 'copiado' : 'copiar'"></span>
        </button>
      </div>

      <p class="text-xs text-gray-600 mt-2.5">
        Pégalo en la config del MCP como <code class="font-mono text-accent">DEVHUB_TOKEN</code>
        (ver <code class="font-mono">mcp/README.md</code>).
      </p>
    </div>
  </div>
</div>
