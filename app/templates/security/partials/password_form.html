{# Formulario de cambio de contraseña (se carga por HTMX en #password-block).
   Valida en el servidor; al guardar bien vuelve a password_row con aviso. #}
<div id="password-block" class="px-5 py-4 border-b border-surface-border border-l-2 border-l-accent/50"
     x-data="{ show: false }">
  <p class="text-[11px] font-mono uppercase tracking-widest text-accent mb-3.5">— cambiar contraseña</p>

  {% if error %}
  <div class="mb-3.5 px-3 py-2 rounded-lg bg-red-900/30 border border-red-800/50 text-red-300 text-xs">{{ error }}</div>
  {% endif %}

  <form hx-post="/ui/seguridad/password/save" hx-target="#password-block" hx-swap="outerHTML" class="space-y-3.5">
    <div>
      <label class="block text-[10px] font-mono uppercase tracking-widest text-gray-500 mb-1.5">Contraseña actual</label>
      <input name="current_password" type="password" required autocomplete="current-password"
             class="w-full bg-surface border border-surface-border rounded-[9px] px-3 py-2.5 text-sm font-mono text-gray-100 placeholder-gray-600 focus:outline-none focus:border-accent/50 transition-colors" />
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3.5">
      <div>
        <label class="block text-[10px] font-mono uppercase tracking-widest text-gray-500 mb-1.5">Nueva contraseña</label>
        <div class="flex items-center bg-surface border border-surface-border rounded-[9px] focus-within:border-accent/50 transition-colors">
          <input name="new_password" :type="show ? 'text' : 'password'" required minlength="8" autocomplete="new-password"
                 class="flex-1 min-w-0 bg-transparent px-3 py-2.5 text-sm font-mono text-gray-100 placeholder-gray-600 focus:outline-none" />
          <button type="button" @click="show = !show" title="Mostrar / ocultar"
                  class="px-2.5 text-gray-500 hover:text-gray-300 transition-colors">
            <svg x-show="!show" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.9" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.9" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            <svg x-show="show" x-cloak class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.9" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
          </button>
        </div>
      </div>
      <div>
        <label class="block text-[10px] font-mono uppercase tracking-widest text-gray-500 mb-1.5">Repite la nueva</label>
        <input name="confirm_password" :type="show ? 'text' : 'password'" required minlength="8" autocomplete="new-password"
               class="w-full bg-surface border border-surface-border rounded-[9px] px-3 py-2.5 text-sm font-mono text-gray-100 placeholder-gray-600 focus:outline-none focus:border-accent/50 transition-colors" />
      </div>
    </div>
    <p class="text-[11px] text-gray-600">Mínimo 8 caracteres. Cambiarla no cierra tu sesión actual.</p>
    <div class="flex gap-2.5 pt-0.5">
      <button type="button"
              hx-get="/ui/seguridad/password/cancel"
              hx-target="#password-block"
              hx-swap="outerHTML"
              class="font-mono text-xs text-gray-400 bg-surface border border-surface-border rounded-[9px] px-4 py-2.5 hover:text-gray-200 transition-colors">cancelar</button>
      <button type="submit"
              class="text-[13px] font-semibold text-black bg-accent rounded-[9px] px-5 py-2.5 hover:bg-accent-dim transition-colors">Guardar contraseña</button>
    </div>
  </form>
</div>
