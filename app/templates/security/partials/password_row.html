{# Fila de "Contraseña" en reposo (botón Cambiar). Se intercambia por el
   formulario vía HTMX. Muestra un aviso de éxito tras guardar. #}
<div id="password-block" class="px-5 py-4 border-b border-surface-border">
  {% if success %}
  <div class="mb-3 px-3 py-2 rounded-lg bg-accent/10 border border-accent/30 text-accent text-xs font-mono">{{ success }}</div>
  {% endif %}
  <div class="flex items-center justify-between gap-4 flex-wrap">
    <div class="min-w-0">
      <p class="text-[13.5px] text-gray-200 font-medium mb-0.5">Contraseña de la cuenta</p>
      <p class="text-xs text-gray-500">Inicia sesión en la web y la extensión</p>
    </div>
    <button
      hx-get="/ui/seguridad/password/form"
      hx-target="#password-block"
      hx-swap="outerHTML"
      class="font-mono text-[12.5px] text-gray-300 bg-surface border border-surface-border rounded-[9px] px-4 py-2.5 hover:border-accent/40 hover:text-accent transition-colors whitespace-nowrap">
      Cambiar
    </button>
  </div>
</div>
